<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <title>Arda Browser</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <!-- Sekme seridi -->
  <div id="tabbar">
    <div id="tabs"></div>
    <button id="newtab" class="tabbtn" title="Yeni sekme (Ctrl+T)" data-i18n-title="newTab">+</button>
  </div>

  <!-- Arac cubugu -->
  <div id="toolbar">
    <button id="back" class="navbtn" title="Geri" data-i18n-title="back">‹</button>
    <button id="forward" class="navbtn" title="İleri" data-i18n-title="forward">›</button>
    <button id="reload" class="navbtn" title="Yenile (Ctrl+R)" data-i18n-title="reload">⟳</button>
    <button id="home" class="navbtn" title="Ana sayfa" data-i18n-title="home">⌂</button>
    <div id="addrwrap">
      <span id="lock">🔒</span>
      <input id="address" type="text" spellcheck="false" placeholder="Ara veya adres gir" data-i18n-placeholder="addressPlaceholder" />
      <div id="addressSuggestions" class="address-suggestions hidden" role="listbox"></div>
    </div>
    <button id="ardaai" class="navbtn ai-btn" title="Arda AI — Duck.ai altyapısı">✨ <span>Arda AI</span></button>
    <select id="languageSelect" class="language-select" title="Dil" aria-label="Language">
      <option value="tr">🌐 Türkçe</option>
      <option value="en">🌐 English</option>
      <option value="de">🌐 Deutsch</option>
      <option value="fr">🌐 Français</option>
      <option value="es">🌐 Español</option>
      <option value="pt">🌐 Português</option>
      <option value="ru">🌐 Русский</option>
      <option value="ar">🌐 العربية</option>
      <option value="zh">🌐 中文</option>
      <option value="ja">🌐 日本語</option>
      <option value="ko">🌐 한국어</option>
      <option value="hi">🌐 हिन्दी</option>
    </select>
    <button id="shields" class="navbtn shields" title="Reklam engelleyici (Shields)" data-i18n-title="shieldsTitle">
      🛡 <span id="shieldcount">0</span>
    </button>
    <button id="star" class="navbtn" title="Yer imine ekle" data-i18n-title="addBookmark">☆</button>
    <button id="menu" class="navbtn" title="Menü" data-i18n-title="menu">☰</button>
  </div>

  <!-- Yer imleri cubugu -->
  <div id="bookmarksbar"></div>

  <!-- Bul cubugu -->
  <div id="findbar" class="hidden">
    <input id="findinput" type="text" placeholder="Sayfada bul" data-i18n-placeholder="findPage" />
    <span id="findcount">0/0</span>
    <button id="findprev" class="navbtn">↑</button>
    <button id="findnext" class="navbtn">↓</button>
    <button id="findclose" class="navbtn">✕</button>
  </div>

  <!-- Webview'lerin durdugu alan -->
  <div id="views"></div>

  <!-- Menu -->
  <div id="menupanel" class="panel hidden">
    <div class="menuitem" data-act="newtab">＋ <span data-i18n="newTab">Yeni sekme</span></div>
    <div class="menuitem" data-act="private">🕶 <span data-i18n="privateTab">Yeni gizli sekme</span></div>
    <div class="sep"></div>
    <div class="menuitem" data-act="bookmarks">★ <span data-i18n="bookmarks">Yer imleri</span></div>
    <div class="menuitem" data-act="history">🕘 <span data-i18n="history">Geçmiş</span></div>
    <div class="menuitem" data-act="downloads">⬇ <span data-i18n="downloads">İndirilenler</span></div>
    <div class="menuitem" data-act="find">🔍 <span data-i18n="findPage">Sayfada bul</span></div>
    <div class="sep"></div>
    <div class="menuitem" data-act="settings">⚙ <span data-i18n="settings">Ayarlar</span></div>
  </div>

  <!-- Yan panel (gecmis / indirilenler / yer imleri / ayarlar) -->
  <div id="overlay" class="hidden"></div>
  <div id="sidepanel" class="hidden">
    <div id="panelhead"><span id="paneltitle"></span><button id="panelclose" class="navbtn">✕</button></div>
    <div id="panelbody"></div>
  </div>

  <script src="i18n.js"></script>
  <script src="renderer.js"></script>
</body>
</html>
