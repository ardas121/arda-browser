<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <title>New Tab</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: "Segoe UI", system-ui, sans-serif;
      background: #ffffff;
      color: #202124; height: 100vh;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
    }
    .emblem { font-size: 60px; line-height: 1; margin-bottom: 10px; }
    .logo { font-size: 30px; font-weight: 300; letter-spacing: 5px; margin-bottom: 4px; }
    .logo span { color: #fb542b; font-weight: 600; }
    .sub { color: #b0b4ba; font-size: 11px; margin-bottom: 30px; letter-spacing: 2px; }
    form { width: min(600px, 86vw); display: flex; border-radius: 28px; box-shadow: 0 4px 18px rgba(20,20,40,.10); }
    input {
      flex: 1; padding: 15px 22px; font-size: 16px;
      border: 1px solid #e5e7eb; border-right: none;
      border-radius: 28px 0 0 28px; background: #f7f8fa; color: #202124; outline: none;
    }
    input:focus { border-color: #fb542b; }
    button {
      padding: 0 26px; border: none; background: #fb542b; color: #fff;
      border-radius: 0 28px 28px 0; font-size: 16px; cursor: pointer;
    }
    .links { display: flex; gap: 14px; margin-top: 34px; flex-wrap: wrap; justify-content: center; }
    a.tile {
      width: 92px; height: 78px; border-radius: 14px; background: #f7f8fa;
      border: 1px solid #e5e7eb; text-decoration: none; color: #202124;
      display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 8px; font-size: 12px;
    }
    a.tile:hover { background: #fff; border-color: #fb542b; box-shadow: 0 8px 20px rgba(20,20,40,.08); }
    a.tile .e { font-size: 26px; }
    .foot { position: fixed; bottom: 18px; color: #c2c6cc; font-size: 11px; }
  </style>
</head>
<body>
  <div class="emblem">🧭</div>
  <div class="logo">ARDA<span>BROWSER</span></div>
  <div class="sub">GİZLİLİĞİN KORUNDUĞU TARAYICI</div>
  <form action="https://duckduckgo.com/">
    <input name="q" placeholder="DuckDuckGo ile ara veya adres gir" autofocus />
    <button type="submit">Ara</button>
  </form>
  <div class="links">
    <a class="tile" href="https://www.youtube.com"><span class="e">▶</span>YouTube</a>
    <a class="tile" href="https://www.google.com"><span class="e">🔍</span>Google</a>
    <a class="tile" href="https://github.com"><span class="e">🐙</span>GitHub</a>
    <a class="tile" href="https://www.wikipedia.org"><span class="e">📚</span>Wikipedia</a>
    <a class="tile" href="https://twitter.com"><span class="e">𝕏</span>X</a>
    <a class="tile" href="https://www.reddit.com"><span class="e">👽</span>Reddit</a>
  </div>
  <div class="foot">🛡 Reklam ve izleyici engelleme açık</div>
</body>
</html>
