<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <title>Arda Browser</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: "Segoe UI", system-ui, sans-serif;
      background: #ffffff;
      color: #202124; height: 100vh;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
    }
    .emblem { font-size: 60px; line-height: 1; margin-bottom: 10px; }
    .logo { font-size: 30px; font-weight: 300; letter-spacing: 5px; margin-bottom: 4px; }
    .logo span { color: #fb542b; font-weight: 600; }
    .sub { color: #b0b4ba; font-size: 11px; margin-bottom: 30px; letter-spacing: 2px; }
    form { width: min(600px, 86vw); display: flex; border-radius: 28px; box-shadow: 0 4px 18px rgba(20,20,40,.10); }
    input {
      flex: 1; padding: 15px 22px; font-size: 16px;
      border: 1px solid #e5e7eb; border-right: none;
      border-radius: 28px 0 0 28px; background: #f7f8fa; color: #202124; outline: none;
    }
    input:focus { border-color: #fb542b; }
    button {
      padding: 0 26px; border: none; background: #fb542b; color: #fff;
      border-radius: 0 28px 28px 0; font-size: 16px; cursor: pointer;
    }
    .links { display: flex; gap: 14px; margin-top: 34px; flex-wrap: wrap; justify-content: center; }
    a.tile {
      width: 92px; height: 78px; border-radius: 14px; background: #f7f8fa;
      border: 1px solid #e5e7eb; text-decoration: none; color: #202124;
      display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 8px; font-size: 12px;
    }
    a.tile:hover { background: #fff; border-color: #fb542b; box-shadow: 0 8px 20px rgba(20,20,40,.08); }
    a.tile .e { width: 30px; height: 30px; object-fit: contain; }
    .foot { position: fixed; bottom: 18px; color: #c2c6cc; font-size: 11px; }
    html[dir="rtl"] input { border-right: 1px solid #e5e7eb; border-left: none; border-radius: 0 28px 28px 0; }
    html[dir="rtl"] button { border-radius: 28px 0 0 28px; }
  </style>
</head>
<body>
  <div class="emblem">🧭</div>
  <div class="logo">ARDA<span>BROWSER</span></div>
  <div id="tagline" class="sub">GİZLİLİĞİN KORUNDUĞU TARAYICI</div>
  <form action="https://duckduckgo.com/">
    <input id="searchInput" name="q" placeholder="DuckDuckGo ile ara veya adres gir" dir="auto" autofocus />
    <button id="searchButton" type="submit">Ara</button>
  </form>
  <div class="links">
    <a class="tile" href="https://www.youtube.com"><img class="e" src="https://www.google.com/s2/favicons?sz=64&amp;domain=youtube.com" alt="" />YouTube</a>
    <a class="tile" href="https://www.google.com"><img class="e" src="https://www.google.com/s2/favicons?sz=64&amp;domain=google.com" alt="" />Google</a>
    <a class="tile" href="https://github.com"><img class="e" src="https://www.google.com/s2/favicons?sz=64&amp;domain=github.com" alt="" />GitHub</a>
    <a class="tile" href="https://www.wikipedia.org"><img class="e" src="https://www.google.com/s2/favicons?sz=64&amp;domain=wikipedia.org" alt="" />Wikipedia</a>
    <a class="tile" href="https://x.com"><img class="e" src="https://www.google.com/s2/favicons?sz=64&amp;domain=x.com" alt="" />X</a>
    <a class="tile" href="https://www.reddit.com"><img class="e" src="https://www.google.com/s2/favicons?sz=64&amp;domain=reddit.com" alt="" />Reddit</a>
  </div>
  <div id="shieldFoot" class="foot">🛡 Reklam ve izleyici engelleme açık</div>
  <script src="i18n.js"></script>
  <script>
    const requested = new URLSearchParams(location.search).get("lang") ||
      (navigator.language || "en").split("-")[0].toLowerCase();
    const lang = ARDA_I18N.supported.includes(requested) ? requested : "en";
    const tr = (key) => ARDA_I18N.get(lang, key);
    document.documentElement.lang = lang;
    document.documentElement.dir = lang === "ar" ? "rtl" : "ltr";
    document.title = tr("newTab");
    document.getElementById("tagline").textContent = tr("privacyTagline");
    document.getElementById("searchInput").placeholder = tr("duckSearch");
    document.getElementById("searchButton").textContent = tr("search");
    document.getElementById("shieldFoot").textContent = "🛡 " + tr("shieldFoot");
  </script>
</body>
</html>
