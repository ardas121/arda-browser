name: APK Derle ve Yayinla

# Ne zaman calisir:
#  - "v1.0.13" gibi bir surum etiketi (tag) gonderildiginde
#  - Actions sekmesinden elle calistirildiginda (workflow_dispatch)
# Her iki durumda da imzali/imzasiz release APK derlenip GitHub Releases'e eklenir.
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      VERSION: v1.0.13
    steps:
      - name: Depoyu indir
        uses: actions/checkout@v4

      - name: JDK 17 kur
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Android SDK kur
        uses: android-actions/setup-android@v3

      - name: SDK paketlerini hazirla
        run: sdkmanager "platforms;android-35" "build-tools;35.0.0" "platform-tools"

      - name: Imza anahtarini hazirla
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          if [ -n "$KEYSTORE_BASE64" ]; then
            echo "$KEYSTORE_BASE64" | base64 -d > android/app/release.jks
            {
              echo "storeFile=app/release.jks"
              echo "storePassword=$KEYSTORE_PASSWORD"
              echo "keyAlias=$KEY_ALIAS"
              echo "keyPassword=$KEY_PASSWORD"
            } > android/key.properties
            echo "Imza anahtari hazirlandi -> imzali APK uretilecek."
          else
            echo "Imza anahtari yok -> imzasiz APK uretilecek (kurulum icin imzalanmasi gerekir)."
          fi

      - name: Release APK derle
        working-directory: android
        run: |
          chmod +x ./gradlew
          ./gradlew assembleRelease --no-daemon --stacktrace

      - name: APK'yi topla
        run: |
          mkdir -p out
          APK=$(find android/app/build/outputs/apk/release -name "*.apk" | head -1)
          echo "Bulunan APK: $APK"
          VER="${{ github.ref_type == 'tag' && github.ref_name || env.VERSION }}"
          cp "$APK" "out/ArdaBrowser-${VER}.apk"

      - name: APK'yi artifact olarak yukle
        uses: actions/upload-artifact@v4
        with:
          name: ArdaBrowser-APK
          path: out/*.apk

      - name: GitHub Release olustur
        if: success()
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_type == 'tag' && github.ref_name || env.VERSION }}
          name: Arda Browser ${{ github.ref_type == 'tag' && github.ref_name || env.VERSION }}
          body: |
            ## Arda Browser ${{ github.ref_type == 'tag' && github.ref_name || env.VERSION }} (Mobil / APK)

            📱 Telefonuna indirip kurabilirsin. Indirdikten sonra "Bilinmeyen
            kaynaklardan kuruluma izin ver" demen gerekebilir.

            🛡️ Reklam ve izleyici engelleme, gizli sekme ve Google Guvenli
            Tarama korumasi acik.
          files: out/*.apk
