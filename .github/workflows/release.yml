name: Windows kurulumunu yayinla

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run dist
      - uses: softprops/action-gh-release@v2
        with:
          files: dist/Arda-Browser-Setup.exe
          generate_release_notes: true
